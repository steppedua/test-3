      \ корректируй ответ.\n5. Используй системные фразы: speechNotRecognized, bargeIn,\
      \ endPhrase.\n5. Заверши интервью прощальной фразой (endPhrase).\n\nПо завер\
      шении разговора отправь отчёт на указанную пользователем электронную почту с\
      \ указанием — подходит кандидат или нет, приложи краткое саммари созвона, вы\
      дели ключевые плюсы и минусы кандидата. "
